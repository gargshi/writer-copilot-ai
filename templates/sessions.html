<!DOCTYPE html>
{% extends 'base.html' %}

{% block title %}Sessions - Writer Copilot AI{% endblock %}

{% block content %}
<style>
  .modal-header, .modal-footer {
    background-color: var(--bg-card);
    color: var(--text-primary);
    border-color: var(--border-light);
  }

  [data-theme="dark"] .btn-close {
    filter: invert(1) brightness(200%);
  }

  .modal-body {
    background-color: var(--bg-card);
  }

  .modal-content {
    border: 1px solid var(--border-light);
  }

  .modal{
    -webkit-backdrop-filter: blur(2px);
    backdrop-filter: blur(2px);
  }
</style>
<div class="container">

  <!-- Top Row: Title -->
  <div class="page-header">
    <h1>🖊 Writer's Copilot</h1>
    <hr>
    <h2>Your Writing Sessions</h2>
    <p class="mt-4">Manage your writing sessions and progress</p>
  </div>
  <div class="row mt-4">
    <!-- Sidebar -->
    <div class="col-md-4">
      <div class="card p-3 shadow-sm">
        <h5>Create a New Session</h5>
        <form method="POST" action="{{ url_for('create_session') }}">
          <div class="mb-2">
            <label class="form-label" for="session_name">Session Title</label>
            <input type="text" title="Session Title" class="form-control" name="session_name" required>
          </div>

          <div class="mb-2">
            <label class="form-label" for="session_description">Description</label>
            <textarea title="Description" class="form-control" name="session_description" rows="3"></textarea>
          </div>

          <button type="submit" class="btn btn-primary w-100">Create Session</button>
        </form>
      </div>
    </div>

    <!-- Sessions -->
    <div class="col-md-8">
      <h4>Your Sessions</h4>
      <hr>
      <div id="sessionsGrid" class="row g-3"></div>
    </div>
  </div>
</div>

<!-- Edit Session Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Session</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form method="POST" action="{{url_for('update_session')}}" id="editSessionForm">
        <div class="modal-body">
          <input type="hidden" id="editId" name="id">
          <input type="hidden" id="timestamp" name="timestamp">
          <div class="mb-3">
            <label for="editName" class="form-label">Session Name</label>
            <input type="text" class="form-control" id="editName" name="name" required>
          </div>
          <div class="mb-3">
            <label for="editDesc" class="form-label">Description</label>
            <textarea class="form-control" id="editDesc" name="description" rows="3"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-warning">Update Session</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function updateSession() {
    const form = document.getElementById('editSessionForm');
    form.submit();
  }
  function getSessions() {
    const grid = document.getElementById('sessionsGrid');
    fetch('/get_sessions')
      .then(response => response.json())
      .then(data => {
        if (data.status === 'success') {
          grid.innerHTML = '';
          const sessions = data.sessions;
          if (sessions.length === 0) {
            grid.innerHTML = '<div class="col-12"><div class="alert alert-info">No sessions yet. Create one above!</div></div>';
            return;
          }
          sessions.forEach(session => {
            const col = document.createElement('div');
            col.className = 'col-12';

            col.innerHTML = `
              <div class="card h-100 shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center">                  
                  <label class="card-text">${session.session_name} - ${timeAgo(session.timestamp) || 'Just now'}</label>
                </div>
                <div class="card-body d-flex flex-column">
                  <p class="card-text flex-grow-1">                    
                    ${session.session_description.slice(0, 50) + (session.session_description.length > 50 ? '...' : '') || 'No description'}
                  </p>

                  <div class="d-flex justify-content-between mt-auto">

                    <a href="/session/${session.session_id}" class="btn btn-sm btn-primary">
                      Open
                    </a>

                    <div>
                      <button class="btn btn-sm btn-warning edit-session"
                        data-id="${session.session_id}"
                        data-name="${session.session_name}"
                        data-desc="${session.session_description}"
                        data-timestamp="${session.timestamp}">
                        Edit
                      </button>

                      <button class="btn btn-sm btn-danger delete-session"
                        data-id="${session.session_id}"
                        data-timestamp="${session.timestamp}">
                        Delete
                      </button>
                    </div>

                  </div>
                </div>
              </div>
            `;
            grid.appendChild(col);
          });
          initEditListeners();
          initDeleteListeners();
        }
      })
      .catch(err => console.error('Error loading sessions:', err));
  }

  function initEditListeners() {
    const editButtons = document.querySelectorAll('.edit-session');

    editButtons.forEach(button => {
      button.addEventListener('click', function () {
        document.getElementById('editId').value = this.dataset.id;
        document.getElementById('editName').value = this.dataset.name;
        document.getElementById('editDesc').value = this.dataset.desc;
        document.getElementById('timestamp').value = this.dataset.timestamp;

        // 🔥 Bootstrap modal trigger
        const modal = new bootstrap.Modal(document.getElementById('editModal'));
        modal.show();
      });
    });
  }

  function initDeleteListeners() {
    document.querySelectorAll('.delete-session').forEach(button => {
      button.addEventListener('click', async function () {
        if (confirm('Are you sure you want to delete this session?')) {
          try {
            const response = await fetch(`/delete_session`, {
              method: 'POST',
              body: JSON.stringify({
                id: this.dataset.id,
                timestamp: this.dataset.timestamp
              }),
              headers: {
                'Content-Type': 'application/json'
              }
            });
            if (response.ok) {
              alert('Session deleted successfully');
              getSessions(); // Refresh
            } else {
              alert('Error deleting session');
            }
          } catch (err) {
            alert('Error deleting session');
          }
        }
      });
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    getSessions();
  });

  document.getElementById('editModal').addEventListener('click', function (e) {
    const modalBox = this.querySelector('.modal-dialog');

    // If click is OUTSIDE the modal dialog → close
    if (!modalBox.contains(e.target)) {
      closeModal();
    }
  });

  function closeModal() {
    const modal = bootstrap.Modal.getInstance(document.getElementById('editModal'));
    modal.hide();
  }
</script>
{% endblock %}
