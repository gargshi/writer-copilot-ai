<!DOCTYPE html>
{% extends 'base.html' %}

{% block title %}Sessions - Writer Copilot AI{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
<style>
  

  /* =========================
   BUTTONS (match your system)
========================= */
  .btn {
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
  }

  .btn-outline-primary {
    background: #4f46e5;
    color: white;
  }

  .btn-outline-warning {
    background: #f59e0b;
    color: white;
  }

  .btn-outline-danger {
    background: #ef4444;
    color: white;
  }

  /* =========================
   MODAL (aligned with your CSS)
========================= */
  #editModal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.45);
  }

  #editModal.active {
    display: flex;
  }

  .modal-content {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 400px;
  }

  .container{
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .layout{
    display: flex;
    gap: 20px;
  }

  .sidebar{
    display: flex;
    flex: 0.4;
    flex-direction: column;    
    background: #fff4e8;
    border-radius: 12px;
    padding: 18px;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    height: fit-content;
  }

  .create-session-form{    
    display: flex;
    flex-direction: column;
    gap: 10px;
    
  }

  .create-session-form textarea{    
    height: 100px;
    width: -webkit-fill-available;
    border:1px solid black;
    border-radius: 5px;
  }

  .create-session-form input{
    padding: 10px;
    border:1px solid black;
    border-radius: 5px;
  }

  .create-session-form button{
    padding: 10px;
    border-radius: 5px;
  }

  .sessions-section{    
    flex: 0.6;  
    background: #fff4e8;
    border-radius: 12px;
    padding: 18px;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    gap: 10px;
  }

  #sessionsGrid{
    display: flex;
    flex-direction: column;
    flex-wrap: wrap;
    gap: 20px;
  }

  .session-footer .btn-group{
    display: flex;
    gap: 10px;
  }
  
  .session{
    display: flex;
    justify-content: space-between;    
    background: #fff4e8;
    border-radius: 12px;
    padding: 18px;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    border: 1px solid black;
  }

  .session .session-body{
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .session .session-footer{
    display: flex;
    gap: 10px;
  }




  
</style>

<div class="container">

  <!-- Top Row: Title -->
  <div class="page-header">
    <h1>Story Sessions</h1>
    <p class="lead">Manage your writing sessions and progress</p>
  </div>

  <!-- Second Row: Two Columns -->
  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <h3>Create Session</h3>

      <form class="create-session-form" method="POST" action="{{ url_for('create_session') }}">
        <label>Session Title</label>
        <input type="text" name="session_name" required>

        <label>Description</label>
        <textarea name="session_description" rows="3"></textarea>

        <button type="submit" class="btn-primary">Create Session</button>
      </form>
    </div>

    <!-- Sessions -->
    <div class="sessions-section">
      <h2>Your Sessions</h2>
      <div id="sessionsGrid"></div>
    </div>

  </div>
</div>


<!-- Edit Session Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Session</h5>
        <button type="button" class="btn-danger" onclick="closeModal()">&times;</button>
      </div>
      <form method="POST" action="{{url_for('update_session')}}" id="editSessionForm">
        <div class="modal-body">
          <input type="hidden" id="editId" name="id">
          <input type="hidden" id="timestamp" name="timestamp">
          <div class="mb-3">
            <label for="editName" class="form-label">Session Name</label>
            <input type="text" class="form-control" id="editName" name="name" required>
          </div>
          <div class="mb-3">
            <label for="editDesc" class="form-label">Description</label>
            <textarea class="form-control" id="editDesc" name="description" rows="3"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-warning">Update Session</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function updateSession() {
    const form = document.getElementById('editSessionForm');
    form.submit();
  }
  function getSessions() {
    const grid = document.getElementById('sessionsGrid');
    fetch('/get_sessions')
      .then(response => response.json())
      .then(data => {
        if (data.status === 'success') {
          grid.innerHTML = '';
          const sessions = data.sessions;
          if (sessions.length === 0) {
            grid.innerHTML = '<div class="col-12"><div class="alert alert-info">No sessions yet. Create one above!</div></div>';
            return;
          }
          sessions.forEach(session => {
            const col = document.createElement('div');
            col.className = 'session';
            col.innerHTML = `
              <div class="session-left">
                <div class="session-title">
                  ${session.session_name}
                </div>
                <div class="session-body">
                  <p class="card-text flex-grow-1 text-muted">
                    ${session.session_description.slice(0, 50) + (session.session_description.length > 50 ? '...' : '') || 'No description'}
                  </p>       
                  <small class="text-muted mt-auto">
                    Created: ${session.timestamp}
                  </small>
                  <small class="text-muted">
                    Session ID: ${session.session_id}
                  </small>
                </div>
              </div>
              <div class="session-right">
                <div class="session-footer">
                  <div class="btn-group">                  
                    <a href="/session/${session.session_id}" class="btn btn-outline-primary">
                      <i class="bi bi-box-arrow-up-right"></i> Open
                    </a>
                    <button class="btn btn-outline-warning edit-session me-1" data-id="${session.session_id}" data-name="${session.session_name}" data-desc="${session.session_description}" data-timestamp="${session.timestamp}">
                      <i class="bi bi-pencil"></i> Edit
                    </button>
                  </div>                    
                  <button class="btn btn-outline-danger delete-session me-1" data-id="${session.session_id}" data-timestamp="${session.timestamp}">
                    <i class="bi bi-trash"></i> Delete
                  </button>              
                </div>
              </div>
          `;
            grid.appendChild(col);
          });
          initEditListeners();
          initDeleteListeners();
        }
      })
      .catch(err => console.error('Error loading sessions:', err));
  }

  function initEditListeners() {
    const editButtons = document.querySelectorAll('.edit-session');
    const modal = document.getElementById('editModal');
    editButtons.forEach(button => {
      button.addEventListener('click', function () {
        document.getElementById('editId').value = this.dataset.id;
        document.getElementById('editName').value = this.dataset.name;
        document.getElementById('editDesc').value = this.dataset.desc;
        document.getElementById('timestamp').value = this.dataset.timestamp;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
      });
    });
  }

  function initDeleteListeners() {
    document.querySelectorAll('.delete-session').forEach(button => {
      button.addEventListener('click', async function () {
        if (confirm('Are you sure you want to delete this session?')) {
          try {
            const response = await fetch(`/delete_session`, {
              method: 'POST',
              body: JSON.stringify({
                id: this.dataset.id,
                timestamp: this.dataset.timestamp
              }),
              headers: {
                'Content-Type': 'application/json'
              }
            });
            if (response.ok) {
              alert('Session deleted successfully');
              getSessions(); // Refresh
            } else {
              alert('Error deleting session');
            }
          } catch (err) {
            alert('Error deleting session');
          }
        }
      });
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    getSessions();
  });

  function closeModal() {
    const modal = document.getElementById('editModal');
    modal.classList.remove('active');
    document.body.style.overflow = 'auto';
  }

  document.getElementById('editModal').addEventListener('click', function (e) {
    const modalBox = this.querySelector('.modal-dialog');

    // If click is OUTSIDE the modal dialog → close
    if (!modalBox.contains(e.target)) {
      closeModal();
    }
  });
</script>
{% endblock %}
